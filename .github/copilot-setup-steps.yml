name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/copilot-setup-steps.yml
      - package.json
      - package-lock.json
      - tsconfig.json
      - vite.config.ts
      - vitest.config.ts
      - eslint.config.js

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Print environment info
        run: |
          node --version
          npm --version

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
